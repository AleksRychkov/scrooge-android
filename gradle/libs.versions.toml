[versions]
# region android-build-logic
compileSdk = "36"
minSdk = "26"
targetSdk = "36"
applicationId = "dev.aleksrychkov.scrooge"
versionCode = "1"
versionName = "0.1"
# endregion

agp = "8.13.0"
android-material="1.13.0"

detekt="1.23.8"

kotlin = "2.2.20"

juint = "5.13.4"


[libraries]
android-gradle-plugin = { module = "com.android.tools.build:gradle", version.ref = "agp" }
kotlin-gradle-plugin = { module = "org.jetbrains.kotlin:kotlin-gradle-plugin", version.ref = "kotlin" }

android-material = { group = "com.google.android.material", name = "material", version.ref = "android-material" }

detekt-formatting = { module = "io.gitlab.arturbosch.detekt:detekt-formatting", version.ref = "detekt" }

junit = { group = "org.junit.jupiter", name = "junit-jupiter", version.ref = "juint" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
detekt = { id = "io.gitlab.arturbosch.detekt", version.ref = "detekt" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }

